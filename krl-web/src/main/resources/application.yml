server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: ${SERVER_PORT:2026}

spring:
  mvc:
    static-path-pattern: "/**"
  application:
    name: krl-web
  servlet:
    multipart:
      max-file-size: ${KRL_MAX_FILE_SIZE:1000MB}
      max-request-size: ${KRL_MAX_REQUEST_SIZE:1000MB}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  file:
    name: ${KRL_LOG_DIR:${user.home}/.KrlParser/logs}/krl-analysis.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
  level:
    root: INFO
    org.springframework: INFO

krl:
  runtime:
    mode: ${KRL_RUNTIME_MODE:desktop}
  log:
    dir: ${KRL_LOG_DIR:${user.home}/.KrlParser/logs}
  config:
    path: ${KRL_CONFIG_PATH:${user.home}/.KrlParser/Config.yml}
  storage:
    temp-dir: ${KRL_STORAGE_TEMP_DIR:${user.home}/.KrlParser/tmp}
    result-dir: ${KRL_STORAGE_RESULT_DIR:${user.home}/.KrlParser/results}
    task-retention: ${KRL_TASK_RETENTION:PT12H}
    cleanup-interval: ${KRL_CLEANUP_INTERVAL:PT30M}
  analysis:
    max-concurrent-tasks: ${KRL_MAX_CONCURRENT_TASKS:1}
    max-active-tasks: ${KRL_MAX_ACTIVE_TASKS:2}
