<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KRL Parser - 机器人调用关系分析</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script src="vendor/tailwindcss.js"></script>
    <script src="vendor/cytoscape.min.js"></script>
    <script src="vendor/dagre.min.js"></script>
    <script src="vendor/cytoscape-dagre.min.js"></script>
    <script src="vendor/lucide.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-shell">
    <header id="appHeader" class="app-header">
        <div class="brand-block">
            <div class="brand-icon">
                <i data-lucide="bot" class="icon-white"></i>
            </div>
            <div>
                <h1 class="brand-title">KRL Parser <span id="appVersionBadge" class="hidden" aria-label="应用版本"></span></h1>
                <p class="brand-subtitle">KUKA 机器人备份分析工具</p>
            </div>
        </div>

        <div class="header-actions">
            <button id="headerMenuToggle" type="button" class="toolbar-button secondary menu-toggle-button" aria-expanded="false" aria-controls="headerMenuPanel">
                <i data-lucide="menu"></i>
                <span class="menu-toggle-label">操作菜单</span>
                <i data-lucide="chevron-down" class="menu-toggle-chevron"></i>
            </button>

            <div id="headerMenuPanel" class="header-menu-panel hidden" aria-hidden="true">
                <div class="toolbar-block">
                    <div class="file-input-wrapper toolbar-item toolbar-item-grow">
                        <button id="fileUploadButton" type="button" class="toolbar-button primary wide-button">
                            <i data-lucide="upload-cloud"></i>
                            <span id="fileUploadText">上传备份 (.zip)</span>
                        </button>
                        <input type="file" id="fileUpload" accept=".zip" multiple>
                    </div>

                    <button id="configButton" type="button" class="toolbar-button secondary toolbar-item">
                        <i data-lucide="file-cog"></i>
                        <span>Config</span>
                    </button>

                    <button id="startAnalysisBtn" type="button" class="toolbar-button success toolbar-item action-disabled" disabled>
                        <i data-lucide="play"></i>
                        <span>开始分析</span>
                    </button>

                    <button id="downloadExcelBtn" type="button" class="toolbar-button warning toolbar-item action-disabled" disabled>
                        <i data-lucide="download"></i>
                        <span>下载Excel</span>
                    </button>
                </div>

                <div id="statusBlock" class="status-block hidden">
                    <span id="runtimeStatusBadge" class="status-badge neutral">Server 模式</span>
                    <span id="taskStatusBadge" class="status-badge neutral">等待上传</span>
                </div>
            </div>
        </div>
    </header>

    <main id="mainShell" class="main-shell">
        <aside id="infoSidebar" class="floating-panel info-panel panel-hidden" aria-hidden="true">
            <div class="panel-header">
                <div class="panel-title">
                    <i data-lucide="info"></i>
                    <span>详情信息</span>
                </div>
                <button id="infoSidebarClose" type="button" class="panel-close-button">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <div class="panel-section">
                <div class="section-title">机器人信息</div>
                <div class="info-card info-card-accent">
                    <div class="info-label">机器人名字</div>
                    <div id="metaName" class="info-value">--</div>
                </div>
                <div class="info-card">
                    <div class="info-label">备份文件</div>
                    <div id="metaArchiveName" class="info-break">--</div>
                </div>
                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-label">版本</div>
                        <div id="metaVersion" class="info-mono">--</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">备份时间</div>
                        <div id="metaDate" class="info-mono">--</div>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-label">已安装的包</div>
                    <div id="techPackList" class="tech-pack-list">
                        <div class="info-empty">暂无数据</div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-title">节点信息</div>
                <div id="nodeDetailEmpty" class="info-empty">点击节点可在此查看详情。桌面端和移动端双击节点查看文件属性，桌面端右键查看相关信息；移动端长按也可查看文件属性。</div>
                <div id="nodeDetailContent" class="node-detail-grid hidden">
                    <div class="info-card info-card-accent-soft">
                        <div class="info-label">节点名称</div>
                        <div id="nodeName" class="info-value">--</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">节点类型</div>
                        <div id="nodeType" class="info-mono">--</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">文件路径</div>
                        <div id="nodePath" class="info-break">--</div>
                    </div>
                    <div class="info-grid">
                        <div class="info-card">
                            <div class="info-label">创建时间</div>
                            <div id="nodeCreateTime" class="info-mono">--</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">修改时间</div>
                            <div id="nodeModifyTime" class="info-mono">--</div>
                        </div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">相关信息</div>
                        <pre id="nodeRelevantInfo" class="node-relevant-info">--</pre>
                    </div>
                </div>
            </div>
        </aside>

        <div id="canvasShell" class="canvas-shell">
            <div id="cy" class="canvas-view"></div>
            <div id="listView" class="list-view hidden"></div>
        </div>

        <div id="renderModeSwitcher" class="floating-switch render-mode-switch hidden">
            <button id="btnGraphMode" type="button" class="switch-button active">
                <i data-lucide="workflow"></i>
                <span>图谱视图</span>
            </button>
            <button id="btnListMode" type="button" class="switch-button">
                <i data-lucide="list"></i>
                <span>列表视图</span>
            </button>
        </div>

        <div id="viewSwitcher" class="floating-switch view-mode-switch">
            <button id="btnLineView" type="button" class="switch-button active">
                <i data-lucide="network"></i>
                <span>线体信息</span>
            </button>
            <button id="btnCarView" type="button" class="switch-button">
                <i data-lucide="git-branch"></i>
                <span>车型信息</span>
            </button>
        </div>

        <div id="nodeControlPanel" class="floating-panel node-control-panel panel-hidden" aria-hidden="true">
            <div class="panel-header">
                <div class="panel-title">
                    <i data-lucide="sliders-horizontal"></i>
                    <span>节点调整</span>
                </div>
                <button id="nodeControlClose" type="button" class="panel-close-button">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="node-control-body">
                <div class="node-control-row">
                    <button type="button" class="node-type-button" data-node-types="CEll">Cell</button>
                    <input type="range" min="0.6" max="1.8" step="0.05" value="1" class="node-size-slider" data-node-types="CEll">
                </div>
                <div class="node-control-row">
                    <button type="button" class="node-type-button" data-node-types="P_PROGRAM">P程序</button>
                    <input type="range" min="0.6" max="1.8" step="0.05" value="1" class="node-size-slider" data-node-types="P_PROGRAM">
                </div>
                <div class="node-control-row">
                    <button type="button" class="node-type-button" data-node-types="VIRTUAL">虚拟节点</button>
                    <input type="range" min="0.6" max="1.8" step="0.05" value="1" class="node-size-slider" data-node-types="VIRTUAL">
                </div>
                <div class="node-control-row">
                    <button type="button" class="node-type-button" data-node-types="CAR_CODE">车型代码</button>
                    <input type="range" min="0.6" max="1.8" step="0.05" value="1" class="node-size-slider" data-node-types="CAR_CODE">
                </div>
                <div class="node-control-row">
                    <button type="button" class="node-type-button" data-node-types="CAR_PROGRAM">车型程序</button>
                    <input type="range" min="0.6" max="1.8" step="0.05" value="1" class="node-size-slider" data-node-types="CAR_PROGRAM">
                </div>
                <div class="node-control-row">
                    <button type="button" class="node-type-button" data-node-types="ROUTE_PROCESS">轨迹程序</button>
                    <input type="range" min="0.6" max="1.8" step="0.05" value="1" class="node-size-slider" data-node-types="ROUTE_PROCESS">
                </div>
            </div>
            <div class="panel-tip">点击标签高亮节点类型，拖动滑块调整该类型节点尺寸。</div>
        </div>

        <button id="nodeControlTrigger" type="button" class="floating-trigger">
            <i data-lucide="sliders-horizontal"></i>
            <span>节点调整</span>
        </button>

        <div id="nodePopover" class="node-popover hidden"></div>
    </main>

    <div id="loader" class="overlay hidden">
        <div class="overlay-card">
            <div class="overlay-icon">
                <i data-lucide="loader-2"></i>
            </div>
            <div id="loaderText" class="overlay-text">正在初始化...</div>
        </div>
    </div>

    <div id="configModal" class="modal hidden">
        <div class="modal-card config-modal-card">
            <div class="panel-header">
                <div class="panel-title">
                    <i data-lucide="file-cog"></i>
                    <span>Config 编辑器</span>
                </div>
                <button id="configCloseBtn" type="button" class="panel-close-button">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="modal-hint">此处编辑仅对本次分析生效。长期配置请直接修改磁盘中的 <code>Config.yml</code>。</div>
                <div id="configPathText" class="modal-path">--</div>
                <textarea id="configTextarea" class="config-textarea"></textarea>
                <div class="modal-actions">
                    <button id="configReloadBtn" type="button" class="toolbar-button secondary small-button">
                        <i data-lucide="refresh-ccw"></i>
                        <span>从磁盘重新加载</span>
                    </button>
                    <button id="configApplyBtn" type="button" class="toolbar-button primary small-button">
                        <i data-lucide="check"></i>
                        <span>应用到本次分析</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
