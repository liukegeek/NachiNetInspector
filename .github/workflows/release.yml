name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        shell: bash
        run: |
          set -euo pipefail
          BUILD_VERSION="1.0.${GITHUB_RUN_NUMBER}"
          mvn -B versions:set \
            -DnewVersion="$BUILD_VERSION" \
            -DgenerateBackupPoms=false \
            -DprocessAllModules=true
          mvn -B clean verify

      - name: Package desktop application
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="Nachi Net Inspector"
          ASSET_NAME="NachiNetInspector"
          BUILD_VERSION="1.0.${GITHUB_RUN_NUMBER}"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ICON_PATH="icons/windowsIcon.ico"
            PLATFORM="windows"
          else
            ICON_PATH="icons/macIcon.icns"
            PLATFORM="macos"
          fi

          rm -rf build
          mkdir -p build/input build/dist

          JAR_PATH=$(find inspector-web/target -maxdepth 1 -type f \
            -name 'inspector-web-*.jar' ! -name '*.original' | head -n 1)
          if [[ -z "$JAR_PATH" ]]; then
            echo "Packaged inspector-web JAR not found" >&2
            exit 1
          fi
          cp "$JAR_PATH" build/input/app.jar

          jpackage \
            --type app-image \
            --name "$APP_NAME" \
            --app-version "$BUILD_VERSION" \
            --input build/input \
            --main-jar app.jar \
            --icon "$ICON_PATH" \
            --vendor "WaitForU" \
            --dest build/dist

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            (
              cd build/dist
              7z a "../../${ASSET_NAME}-${BUILD_VERSION}-${PLATFORM}.zip" "$APP_NAME"
            )
          else
            ditto -c -k --sequesterRsrc --keepParent \
              "build/dist/${APP_NAME}.app" \
              "${ASSET_NAME}-${BUILD_VERSION}-${PLATFORM}.zip"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-app
          path: NachiNetInspector-*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
